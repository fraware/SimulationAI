name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set API key for test imports
        run: echo "API_KEY=ci-test-key" >> $GITHUB_ENV

      - name: Ruff check
        run: ruff check inter_sim_rl main.py tests

      - name: Ruff format
        run: ruff format --check inter_sim_rl main.py tests

      - name: Pytest
        run: pytest tests -v --tb=short
